run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  skip-dirs:
    - vendor

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  goconst:
    min-len: 3
    min-occurrences: 3
  gocyclo:
    min-complexity: 10
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/sglavoie/dev-helpers/go/qf
  govet:
    check-shadowing: true
  lll:
    line-length: 120
  misspell:
    locale: US

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - typecheck     # Type checking
    - unused        # Check for unused constants, variables, functions and types
    - gofmt         # Check whether code was gofmt-ed
    - goimports     # Check missing or unreferenced package imports
    - goconst       # Find repeated strings that could be replaced by a constant
    - gocyclo       # Compute and check the cyclomatic complexity
    - lll           # Reports long lines
    - misspell      # Find commonly misspelled English words
    - nakedret      # Find naked returns in functions greater than a specified function length
    - prealloc      # Find slice declarations that could potentially be preallocated
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Report unused function parameters

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
    - path: cmd/
      linters:
        - gocyclo
  max-same-issues: 50
  max-issues-per-linter: 50

severity:
  default-severity: error